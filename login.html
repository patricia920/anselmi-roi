<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Anselmi · Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f5f1ea; --card: #fbf8f2; --ink: #1a1714;
    --ink-2: #3d3630; --ink-3: #756b60; --line: #d9d0c0;
    --bordo: #7a3c46; --musgo: #4a6553;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--paper); color: var(--ink);
    min-height: 100vh; display: grid; place-items: center;
    padding: 20px;
  }
  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 8px; padding: 48px 40px; max-width: 380px; width: 100%;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04);
  }
  .brand {
    font-family: 'Lora', Georgia, serif; font-weight: 500;
    font-size: 28px; letter-spacing: -0.01em; color: var(--bordo);
    margin-bottom: 4px;
  }
  .sub {
    font-size: 13px; color: var(--ink-3); margin-bottom: 28px;
  }
  label { font-size: 13px; color: var(--ink-2); display: block; margin-bottom: 8px; }
  input[type="password"] {
    width: 100%; padding: 11px 14px; font: inherit; font-size: 15px;
    background: var(--paper); border: 1px solid var(--line); border-radius: 6px;
    color: var(--ink); outline: none;
  }
  input[type="password"]:focus { border-color: var(--bordo); }
  button {
    width: 100%; margin-top: 16px; padding: 12px;
    background: var(--bordo); color: #fff; border: none; border-radius: 6px;
    font: inherit; font-weight: 500; cursor: pointer;
  }
  button:hover { background: #6a323b; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .err { margin-top: 12px; padding: 10px 14px; background: rgba(122,60,70,0.08);
    border-left: 3px solid var(--bordo); border-radius: 4px;
    font-size: 13px; color: var(--bordo); display: none; }
  .err.show { display: block; }
  .foot { margin-top: 24px; font-size: 11px; color: var(--ink-3); text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Anselmi · ROI</div>
    <div class="sub">Painel interno · acesso restrito</div>
    <form id="form">
      <label for="pw">Senha de acesso</label>
      <input id="pw" type="password" autocomplete="current-password" required autofocus>
      <button id="btn" type="submit">Entrar</button>
      <div class="err" id="err"></div>
    </form>
    <div class="foot">Sessão de 24h · cookie criptografado</div>
  </div>
<script>
const form = document.getElementById('form');
const pwInput = document.getElementById('pw');
const btn = document.getElementById('btn');
const err = document.getElementById('err');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  err.classList.remove('show');
  btn.disabled = true;
  btn.textContent = 'Validando…';
  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwInput.value }),
    });
    const data = await r.json();
    if (data.ok) {
      const next = new URLSearchParams(location.search).get('next') || '/';
      location.href = next;
    } else {
      err.textContent = data.error || 'Erro';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Entrar';
      pwInput.value = '';
      pwInput.focus();
    }
  } catch (e2) {
    err.textContent = 'Erro de rede: ' + e2.message;
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
});
</script>
</body>
</html>
